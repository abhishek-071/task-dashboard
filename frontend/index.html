<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

 <div class="app">
  
  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">MyApp</h2>
    <ul>
      <li onclick="showDashboard(this)">Dashboard</li>
      <li onclick="goToTasks(this)" class="active">Tasks</li>
      <li onclick="openSettings()">Settings</li>
      <li onclick="window.location.href='profile.html'">Profile</li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <h1>Task Manager</h1>

    <!-- Filters -->
    <div class="filters">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('active')">Active</button>
      <button onclick="setFilter('completed')">Completed</button>
    </div>

    <!-- Add Task -->
    <div class="add-task">
      <input id="taskInput" placeholder="Enter new task..." />
      <button onclick="addTask()">Add</button>
    </div>

    <!-- Task List -->
    <ul id="taskList" class="task-list"></ul>
  </main>

  </div>

</body>
</html>
