<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>MyApp</h2>
    <ul>
      <li onclick="showDashboard(this)" class="active">Dashboard</li>
      <li onclick="showTasks(this)">Tasks</li>
      <li onclick="window.location.href='profile.html'">Profile</li>
      <li onclick="logout()">Logout</li>
    </ul>
  </aside>

 <main class="main">

  <!-- DASHBOARD -->
  <section id="dashboardSection">
    <h1>Dashboard</h1>

    <div class="add-task">
      <input id="taskInput" placeholder="Enter new task..." />
      <button onclick="addTask()">Add Task</button>
    </div>
  </section>

  <!-- TASK LIST -->
  <!-- <section id="tasksSection" style="display:none;"> -->
    <!-- <h1>My Tasks</h1> -->
    <!-- <ul id="taskList" class="task-list"></ul> -->
  </section>

</main>

    <!-- Tasks -->
    <section id="tasksSection" style="display:none;">
      <h1>My Tasks</h1>

      <div class="filters">
        <button onclick="setFilter('all')">All</button>
        <button onclick="setFilter('active')">Active</button>
        <button onclick="setFilter('completed')">Completed</button>
      </div>

      <ul id="taskList" class="task-list"></ul>
    </section>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
